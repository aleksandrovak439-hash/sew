body{background-color:var(--bg-body);color:var(--text-primary);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;line-height:1.5}
.header{background-color:var(--bg-header);border-bottom:1px solid var(--border-light);padding:1.25rem 1.5rem;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-sm)}

.approved-tg-btn:hover{background:var(--accent);color:#fff}
.empty-approved{color:var(--text-muted);font-size:.9rem;padding:.5rem 0}
.series-section-title{font-size:1.3rem;font-weight:600;margin-bottom:1.25rem;color:var(--text-secondary)}

.date-badge{font-size:.7rem;background:var(--date-badge);color:var(--date-text);padding:.2rem .5rem;border-radius:20px;font-weight:400}

.video-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);align-items:center;justify-content:center;z-index:1200}

.video-responsive{position:relative;padding-bottom:56.25%;height:0}
.video-responsive iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-close-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);color:#fff;border:none;font-size:1rem;padding:.5rem 1rem;border-radius:40px;cursor:pointer;z-index:20}

.image-modal img{max-width:90%;max-height:90%;border-radius:1rem}

.footer{text-align:center;padding:2rem;margin-top:2rem;border-top:1px solid var(--border-light);color:var(--text-muted);font-size:.85rem}

</style>

"Продавец":{series:1,dates:["02.07"],approvedProbeId:null,probes:[],scene:{title:"1-46 / 2-49 / 3-3. ЗАПРАВКА",content:'<div class="scene-action"><strong>1-46. ЗАПРАВКА. ДЕНЬ 4:</strong> Егор стоит, отвернувшись от кассира, сняв очки и опустив маску, прихлёбывает кофе. Работает телевизор.</div><div class="scene-action">Диктор сообщает новости: смертельное ДТП — Марина Страхова... Егор резко поворачивается к экрану.</div><div class="scene-dialogue"><div class="scene-character">ДИКТОР ТВ</div><div class="scene-lines">Более года назад бесследно исчез муж Марины — Егор Страхов. На прошлой неделе мужчина был признан погибшим.</div></div><div class="scene-action">Егор неловко ставит стаканчик с кофе — падает, проливается. Егор бежит прочь, опрокинув стул.</div><div class="scene-action"><strong>2-49. ЗАПРАВКА. ДЕНЬ 7:</strong> Аня и Витька шепчутся между стеллажами. Аня снимает с полки бутылку газировки и пряники.</div><div class="scene-action">Витька уходит к кассе. Аня рассматривает полки. Вдруг мужская рука сзади зажимает ей рот — охранник уносит её.</div><div class="scene-action"><strong>3-3. ЗАПРАВКА. ДЕНЬ 7:</strong> Настя оббегает магазин, Данила и Олег разбегаются между стеллажами.</div><div class="scene-dialogue"><div class="scene-character">УЧАСТКОВЫЙ</div><div class="scene-lines">(работнице)<br>Скажите, с мальчиком был кто-то ещё?</div></div><div class="scene-dialogue"><div class="scene-character">РАБОТНИЦА</div><div class="scene-lines">Да, с ним ещё девочка была. Но тут её нет…</div></div><div class="scene-dialogue"><div class="scene-character">ДАНИЛА</div><div class="scene-lines">Камеры работают?</div></div><div class="scene-dialogue"><div class="scene-character">РАБОТНИЦА</div><div class="scene-lines">Только над кассами и у выхода. Девочка зашла с мальчиком, а потом — пропала.</div></div>'}},
"Заправщик":{series:1,dates:["02.07"],approvedProbeId:null,probes:[],scene:{title:"1-46. ЗАПРАВКА. ДЕНЬ 4",content:'<div class="scene-action">Егор стоит, отвернувшись от кассира, прихлёбывает кофе.</div><div class="scene-action">Диктор сообщает о смертельном ДТП и исчезновении Егора Страхова. Егор в шоке.</div><div class="scene-action">Он неловко ставит стаканчик — падает, проливается. Егор бежит прочь, опрокинув стул.</div><div class="scene-action">Работник заправки, который подметал зал, отвлекается на шум, недовольно цокает, берёт тряпку...</div>'}},
"Врач 3":{series:2,dates:["04.07"],approvedProbeId:null,probes:[],scene:{title:"2-42 / 2-45. БОЛЬНИЦА. ДЕНЬ 7",content:'<div class="scene-action"><strong>2-42. ПАЛАТА АЛЕКСЕЯ ПЕТРОВИЧА:</strong> Алексей Петрович лежит в больничной постели, подключенный к прибору. В палату заглядывает Настя.</div><div class="scene-dialogue"><div class="scene-character">НАСТЯ</div><div class="scene-lines">Алексей Петрович, к вам можно?</div></div><div class="scene-action">Она пропускает Аню. Девочка бежит к деду.</div><div class="scene-dialogue"><div class="scene-character">АНЯ</div><div class="scene-lines">Деда! Деда, а у тебя что, было два сына?</div></div><div class="scene-action">Лицо Алексея Петровича вздрагивает. Прибор начинает пищать.</div><div class="scene-dialogue"><div class="scene-character">НАСТЯ</div><div class="scene-lines">Алексей Петрович!</div></div><div class="scene-action">Настя бросается к кнопке вызова. Двери распахиваются, вбегают врачи.</div><div class="scene-action"><strong>2-45. КОРИДОР БОЛЬНИЦЫ:</strong> Настя, Данила, Лиза спорят.</div><div class="scene-dialogue"><div class="scene-character">ЛИЗА</div><div class="scene-lines">Это прекрасное предложение! Нужно продать дом и ферму!</div></div><div class="scene-dialogue"><div class="scene-character">НАСТЯ</div><div class="scene-lines">Почему мы вообще это обсуждаем? Это может только Алексей Петрович решать!</div></div><div class="scene-dialogue"><div class="scene-character">ДАНИЛА</div><div class="scene-lines">Доля здравого смысла здесь есть. На деньги, которые предлагает Лесков, можно прожить достойную старость.</div></div><div class="scene-action">В коридоре появляется ВРАЧ 2.</div><div class="scene-dialogue"><div class="scene-character">ВРАЧ 2</div><div class="scene-lines">Страховы? Вашего отца стабилизировали. Он заснул. Завтра приходите.</div></div><div class="scene-dialogue"><div class="scene-character">ДАНИЛА</div><div class="scene-lines">Спасибо.</div></div><div class="scene-action">Врач уходит. Данила обращается к Насте: «Девочку, конечно, мы заберем». Лиза возмущается. Настя ищет Аню — её нет.</div>'}},
"Медсестра 2":{series:2,dates:["04.07"],approvedProbeId:null,probes:[],scene:{title:"2-41. БОЛЬНИЦА. У РЕГИСТРАТУРЫ. ДЕНЬ 7",content:'<div class="scene-action">Настя с Аней заглядывают в регистратуру.</div><div class="scene-dialogue"><div class="scene-character">НАСТЯ</div><div class="scene-lines">Страхов Алексей Петрович в какой палате лежит?</div></div><div class="scene-dialogue"><div class="scene-character">МЕДСЕСТРА-1</div><div class="scene-lines">Да куда ж вы толпой-то к нему? Вон стоят...</div></div><div class="scene-action">Настя оглядывается — видит Данилу и Лизу. Подходит Медсестра-2.</div><div class="scene-dialogue"><div class="scene-character">МЕДСЕСТРА-2</div><div class="scene-lines">(улыбнувшись)<br>Кто к Страхову? Сразу видно, что парочка. Пойдёмте за мной.</div></div><div class="scene-action">Все уходят. Медсестра-1 звонит по телефону.</div>'}},
"Медсестра 1":{series:2,dates:["04.07"],approvedProbeId:null,probes:[],scene:{title:"2-41. БОЛЬНИЦА. У РЕГИСТРАТУРЫ. ДЕНЬ 7",content:'<div class="scene-dialogue"><div class="scene-character">МЕДСЕСТРА-1</div><div class="scene-lines">Да куда ж вы толпой-то к нему? По очереди хотя бы. И бахилы наденьте.</div></div><div class="scene-action">Медсестра-1 звонит по телефону.</div><div class="scene-dialogue"><div class="scene-character">МЕДСЕСТРА-1</div><div class="scene-lines">(в телефон)<br>Здравствуйте, Михаил Михайлович. Вы просили о состоянии здоровья Страхова сообщить... К нему сын приехал. И ещё девушка. Да, сын. Точно. Всегда рада помочь.</div></div>'}},

],scene:{title:"3-10. ЛЕС. САЛОН АВТОМОБИЛЯ ЛЕСКОВА. ДЕНЬ 8",content:'<div class="scene-action">Егор порывисто обнимает спящую Аню, она просыпается.</div><div class="scene-dialogue"><div class="scene-character">АНЯ</div><div class="scene-lines">Папа! Папочка! Я тебя нашла! Я знала, что ты живой! Ты же приходил ко мне! А никто не верил...</div></div><div class="scene-action">Егор с трудом глотает слёзы, целует её и обнимает.</div><div class="scene-dialogue"><div class="scene-character">ЕГОР</div><div class="scene-lines">Погоди, Анют, послушай. Да, я приходил, оставил важный документ - тебе на будущее. И скоро вы с дедом получите деньги за мою смерть. Понимаешь?</div></div><div class="scene-action">Аня серьёзно слушает, вникает.</div><div class="scene-dialogue"><div class="scene-character">ЕГОР</div><div class="scene-lines">В общем, то, что я жив, — это наш с тобой самый большой секрет, дочка. Тайны ты хранить умеешь! Даже маме не выдала, какой подарок я ей приготовил на день рождения...</div></div><div class="scene-dialogue"><div class="scene-character">АНЯ</div><div class="scene-lines">Жалко, что мамочка не смогла полетать на том воздушном шаре. Это был её последний день рождения...</div></div><div class="scene-action">Егор сгребает дочь в охапку, качает, утешая, в душе воя.</div><div class="scene-dialogue"><div class="scene-character">ЕГОР</div><div class="scene-lines">Потерпи, малыш. Я что-нибудь придумаю и вернусь за тобой. Только никому ни слова! Клянись!</div></div><div class="scene-dialogue"><div class="scene-character">АНЯ (поднимает ладошку)</div><div class="scene-lines">Клянусь! Погоди, надо кулачками. Вот так...</div></div><div class="scene-action">Аня складывает кулачок себе и отцу — стучат друг об друга.</div><div class="scene-dialogue"><div class="scene-character">ОХРАННИК 1</div><div class="scene-lines">Выходи.</div></div><div class="scene-action">Егор улыбается, чмокает её и выходит. Аня смотрит, как его уводит охранник. Водитель с переднего сидения обращается к Ане.</div><div class="scene-dialogue"><div class="scene-character">ВОДИТЕЛЬ-ОХРАННИК</div><div class="scene-lines">Ну, что? Не врали мы тебе, что мы папины друзья? Главное, ты никому ничего не говори! Тогда всё в порядке будет с папой твоим.</div></div><div class="scene-action">Аня смотрит настороженно, кивает.</div><div class="scene-action" style="margin-top:1rem;font-style:italic;color:var(--text-muted);">Также водитель-охранник присутствует в сценах: 1-27, 1-28, 2-6, 2-7, 2-9, 2-44, 2-46, 2-49, 4-45 (без слов).</div>'}},

],scene:{title:"3-13. ДВОР ДОМА СТРАХОВЫХ. ДЕНЬ 8",content:'<div class="scene-action">Старенькая девятка тормозит. Из неё выходит дядька, открывает дверцу, выпуская Аню.</div><div class="scene-action">По улице бредут грустные Данила и Настя. Они видят Аню и бегут к ней.</div><div class="scene-dialogue"><div class="scene-character">НАСТЯ</div><div class="scene-lines">Анечка! Вернулась! Ты цела? Тебя никто не обижал?</div></div><div class="scene-dialogue"><div class="scene-character">ДЯДЬКА</div><div class="scene-lines">Я извиняюсь, родители! Тут это... Написано: награда - сто тыщ.</div></div><div class="scene-dialogue"><div class="scene-character">ДАНИЛА</div><div class="scene-lines">Сейчас. Вы только скажите, где вы её нашли?</div></div><div class="scene-dialogue"><div class="scene-character">ДЯДЬКА</div><div class="scene-lines">Да вдоль дороги, смотрю, – бредёт. А до этого фотографии её видел. Ну, точно она!</div></div><div class="scene-action">Данила кивает, достает из кармана, протягивает ему конверт, он заглядывает внутрь, пожимает руку.</div><div class="scene-dialogue"><div class="scene-character">ДАНИЛА</div><div class="scene-lines">Спасибо вам, век не забуду!</div></div><div class="scene-action">Настя ведет Аню в дом. Со своего двора на них смотрит Олег, смаргивает скупую слезу.</div><div class="scene-dialogue"><div class="scene-character">ОЛЕГ</div><div class="scene-lines">(бормочет)<br>Встретились, значит. Вот же Егор…</div></div>'}},

],scene:{title:"4-42. КАБИНЕТ ИВАНА. НОЧЬ 12",content:'<div class="scene-action">Иван смотрит на снимки Насти на экране. На стене — фотографии семьи Страховых и Лескова.</div><div class="scene-action">Стук в дверь. Входит эксперт.</div><div class="scene-dialogue"><div class="scene-character">ЭКСПЕРТ</div><div class="scene-lines">Вань, экспертиза видеорегистратора из машины Марины Страховой готова.</div></div><div class="scene-dialogue"><div class="scene-character">ЭКСПЕРТ</div><div class="scene-lines">Во внутренней памяти остались последние видео, мы даже расшифровку по губам смогли.</div></div><div class="scene-action">Иван читает документ, глаза лезут на лоб. Он смотрит на фото Данилы, зачёркивает знак вопроса.</div>'}},

let isApprovedExpanded=false;
function escapeHtml(s){if(!s)return '';return s.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;})}
function formatPhoneForLink(p){return p.replace(/[^0-9+]/g,'')}

function renderApprovedActors(){
 const c=document.getElementById('approvedListContainer');
 if(APPROVED_ACTORS.length===0){c.innerHTML='<div class="empty-approved">✨ Пока нет утверждённых актёров</div>';return;}
 let html='';
 for(const a of APPROVED_ACTORS){
  html+=`<div class="approved-item" data-id="${a.id}"><div class="approved-photo"><img src="${a.photo}" alt="${a.name}" data-photo="${a.photo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="approved-photo-placeholder" style="display:none">${a.name.charAt(0)}</div></div><div class="approved-info"><div class="approved-role">${escapeHtml(a.role)}</div><div class="approved-actor-name">${escapeHtml(a.name)}</div><div class="approved-details">${escapeHtml(a.age)} • ${escapeHtml(a.details)}</div>`;
  for(const ct of a.contacts){
   if(ct.type==='phone'){const cl=formatPhoneForLink(ct.value);html+=`<a href="tel:${cl}" class="approved-contact-btn">📞 ${ct.value}</a>`;}
   else if(ct.type==='telegram'){html+=`<a href="https://t.me/${ct.value.replace('@','')}" target="_blank" class="approved-tg-btn">✈️ ${ct.value}</a>`;}
  }
  html+='</div></div>';
 }
 c.innerHTML=html;
 document.querySelectorAll('.approved-photo img').forEach(img=>{img.addEventListener('click',function(e){e.stopPropagation();const url=this.getAttribute('data-photo');if(url)openImageModal(url);});});
}

document.getElementById('approvedHeader').addEventListener('click',function(){
 const list=document.getElementById('approvedList'),icon=document.getElementById('approvedToggleIcon');
 if(isApprovedExpanded){list.classList.remove('expanded');icon.textContent='▼';isApprovedExpanded=false;}
 else{list.classList.add('expanded');icon.textContent='▲';isApprovedExpanded=true;}
});

function renderExtras(){
 const container=document.getElementById('extrasContainer');
 const extras=[];for(const [name,data] of Object.entries(CHARACTERS_DB)){if(data.series===0)extras.push({name,data});}
 if(extras.length===0){container.innerHTML='';return;}
 let html=`<div class="series-section-title" style="margin-top:0;">🎬 Вне серий</div><div class="series-grid">`;
 for(const ex of extras){
  const datesHtml=ex.data.dates&&ex.data.dates.length>0?`<div class="character-dates">${ex.data.dates.map(d=>`<span class="date-badge">📅 ${d}</span>`).join('')}</div>`:'';
  html+=`<div class="series-card"><div class="card-header"><div class="series-number">${escapeHtml(ex.name)}</div></div><div class="characters-list"><div class="character-items"><li class="character-item" data-char="${escapeHtml(ex.name)}"><div class="character-name">${escapeHtml(ex.name)}</div>${datesHtml}</li></div></div></div>`;
 }
 html+='</div>';
 container.innerHTML=html;
 document.querySelectorAll('#extrasContainer .character-item').forEach(el=>{el.addEventListener('click',function(){openCharacterModal(this.getAttribute('data-char'));});});
}

function getCharactersBySeries(s){const r=[];for(const [n,d] of Object.entries(CHARACTERS_DB)){if(d.series===s)r.push({name:n,dates:d.dates});}return r;}

function renderSceneHTML(scene){if(!scene||!scene.content)return '';return `<div class="scene-block"><div class="scene-header" onclick="toggleScene(this)"><div class="scene-title"><span class="scene-flag">📖</span><span>${escapeHtml(scene.title)}</span></div><button class="toggle-scene-btn">▶ Развернуть</button></div><div class="scene-content">${scene.content}</div><div style="padding:0 1rem 1rem 1rem;display:none" class="scene-probes-btn"><button class="go-to-probes-btn" onclick="scrollToProbes()">🎬 Перейти к пробам ↓</button></div></div>`;}

function renderSeries(){
 const container=document.getElementById('seriesContainer');
 let html='<div class="series-grid">';
 for(let s=1;s<=4;s++){
  const chars=getCharactersBySeries(s);
  html+=`<div class="series-card"><div class="card-header"><div class="series-number">🎞️ Серия ${s}<span class="badge-count">${chars.length} перс.</span></div></div><div class="characters-list"><div class="character-items">`;
  if(chars.length===0)html+='<div class="empty-message">✨ Персонажи скоро появятся</div>';
  else for(const ch of chars){
   const datesHtml=ch.dates.length>0?`<div class="character-dates">${ch.dates.map(d=>`<span class="date-badge">📅 ${d}</span>`).join('')}</div>`:'';
   html+=`<li class="character-item" data-char="${escapeHtml(ch.name)}"><div class="character-name">${escapeHtml(ch.name)}</div>${datesHtml}</li>`;
  }
  html+='</div></div></div>';
 }
 html+='</div>';
 container.innerHTML=html;
 document.querySelectorAll('#seriesContainer .character-item').forEach(el=>{el.addEventListener('click',function(){openCharacterModal(this.getAttribute('data-char'));});});
}

function openCharacterModal(charName){
 const modal=document.getElementById('probeModal'),modalContent=document.getElementById('modalDynamicContent');
 const data=CHARACTERS_DB[charName];
 const sceneHtml=data.scene?renderSceneHTML(data.scene):'';
 let probesHtml='<div class="probes-section"><div class="probes-title">🎭 Пробы</div>';
 if(!data.probes||data.probes.length===0)probesHtml+='<div class="empty-probes">📹 Пробы для этого персонажа скоро появятся.</div>';
 else{
  probesHtml+='<div class="probes-grid">';
  for(let idx=0;idx<data.probes.length;idx++){
   const p=data.probes[idx];
   const photoPath=p.photo&&p.photo.trim()!==''?p.photo:'https://via.placeholder.com/300x300?text=Нет+фото';
   const isApproved=data.approvedProbeId===p.id;
   const approvedMark=isApproved?'<span class="approved-tag">✅ Утверждён</span>':'';
   const filmLinkHtml=p.filmLink?`<a href="${escapeHtml(p.filmLink)}" target="_blank" class="probe-film-link">🎬 Фильмография</a>`:'';
   const videoBtnHtml=p.videoUrl&&p.videoUrl.trim()!==''?`<button class="watch-video-btn" data-video="${escapeHtml(p.videoUrl)}">🎥 Смотреть видео</button>`:'';
   probesHtml+=`<div class="probe-card ${isApproved?'approved-card':''}"><div class="probe-photo"><img src="${escapeHtml(photoPath)}" alt="${escapeHtml(p.name)}" class="probe-img" data-photo="${escapeHtml(photoPath)}"></div><div class="probe-name">${escapeHtml(p.name)} ${approvedMark}</div>${p.age?`<div class="probe-details">${escapeHtml(p.age)}</div>`:''}${p.details?`<div class="probe-details">${escapeHtml(p.details)}</div>`:''}${p.extra?`<div class="probe-desc">${escapeHtml(p.extra)}</div>`:''}${filmLinkHtml}${videoBtnHtml}</div>`;
  }
  probesHtml+='</div>';
 }
 probesHtml+='</div>';
 modalContent.innerHTML=`<div class="modal-title">🎭 ${escapeHtml(charName)}</div><div class="modal-subtitle">${data.dates.length>0?`📅 Даты съёмок: ${data.dates.join(', ')}`:''}</div>${sceneHtml}${probesHtml}`;
 modal.classList.add('active');
 setTimeout(()=>{const btn=document.querySelector('#modalDynamicContent .go-to-probes-btn');if(btn)btn.onclick=()=>scrollToProbes();},50);
 document.querySelectorAll('.probe-img').forEach(img=>{img.addEventListener('click',function(e){e.stopPropagation();const url=this.getAttribute('data-photo');if(url)openImageModal(url);});});
 document.querySelectorAll('.watch-video-btn').forEach(btn=>{btn.addEventListener('click',function(){const url=this.getAttribute('data-video');if(url&&url.trim())openVideoModal(url);else alert('Ссылка на видео отсутствует');});});
}

function openVideoModal(url){
 const modal=document.getElementById('videoModal'),container=document.getElementById('videoIframeContainer');
 let embed=url;
 if(url.includes('vkvideo.ru')||url.includes('vk.com/video_ext.php'))embed=url;
 else if(url.includes('yandex.net'))embed=url;
 else if(url.includes('youtu.be')||url.includes('youtube.com')){
  if(url.includes('watch?v='))embed=url.replace('watch?v=','embed/');
  else if(url.includes('youtu.be/')){const id=url.split('/').pop();embed='https://www.youtube.com/embed/'+id;}
  else embed=url;
 }
 container.innerHTML=`<iframe src="${embed}" frameborder="0" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; screen-wake-lock;" allowfullscreen></iframe>`;
 modal.classList.add('active');
}

window.toggleScene=function(header){const block=header.closest('.scene-block'),content=block.querySelector('.scene-content'),btn=block.querySelector('.toggle-scene-btn'),probesDiv=block.querySelector('.scene-probes-btn');if(content.classList.contains('expanded')){content.classList.remove('expanded');btn.textContent='▶ Развернуть';if(probesDiv)probesDiv.style.display='none';}else{content.classList.add('expanded');btn.textContent='▼ Свернуть';if(probesDiv)probesDiv.style.display='block';}};
window.scrollToProbes=function(){const sec=document.querySelector('#modalDynamicContent .probes-section');if(sec)sec.scrollIntoView({behavior:'smooth',block:'start'});};
function openImageModal(src){document.getElementById('fullscreenImage').src=src;document.getElementById('imageModal').classList.add('active');}

document.getElementById('closeProbeModal').addEventListener('click',function(){document.getElementById('probeModal').classList.remove('active');});
document.getElementById('closeImageBtn').addEventListener('click',function(){document.getElementById('imageModal').classList.remove('active');});
document.getElementById('closeVideoBtn').addEventListener('click',function(){document.getElementById('videoModal').classList.remove('active');document.getElementById('videoIframeContainer').innerHTML='';});
window.addEventListener('click',function(e){if(e.target===document.getElementById('imageModal'))document.getElementById('imageModal').classList.remove('active');if(e.target===document.getElementById('videoModal')){document.getElementById('videoModal').classList.remove('active');document.getElementById('videoIframeContainer').innerHTML='';}if(e.target===document.getElementById('probeModal'))document.getElementById('probeModal').classList.remove('active');});

const themeSwitcher=document.getElementById('themeSwitcher'),themeIcon=document.getElementById('themeIcon'),themeText=document.getElementById('themeText');
function setTheme(t){document.body.classList.remove('light','dark');document.body.classList.add(t);themeIcon.textContent=t==='light'?'🌞':'🌙';themeText.textContent=t==='light'?'Светлая тема':'Тёмная тема';localStorage.setItem('theme',t);}
const saved=localStorage.getItem('theme');if(saved&&(saved==='light'||saved==='dark'))setTheme(saved);else setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
themeSwitcher.addEventListener('click',function(){setTheme(document.body.classList.contains('dark')?'light':'dark');});

function init(){renderApprovedActors();renderExtras();renderSeries();}
init();
</script>
